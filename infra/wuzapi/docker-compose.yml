services:
  wuzapi:
    build:
      context: ./source
      dockerfile: Dockerfile
    container_name: kesia-wuzapi
    env_file:
      - ../../.env
    environment:
      WUZAPI_ADMIN_TOKEN: ${WUZAPI_ADMIN_TOKEN:?WUZAPI_ADMIN_TOKEN is required}
      WUZAPI_GLOBAL_ENCRYPTION_KEY: ${WUZAPI_GLOBAL_ENCRYPTION_KEY:?WUZAPI_GLOBAL_ENCRYPTION_KEY is required}
      WUZAPI_GLOBAL_HMAC_KEY: ${WUZAPI_WEBHOOK_SECRET:?WUZAPI_WEBHOOK_SECRET is required}
      WUZAPI_GLOBAL_WEBHOOK: ${WUZAPI_WEBHOOK_URL:-http://host.docker.internal:3000/api/webhooks/wuzapi}
      DB_USER: wuzapi
      DB_PASSWORD: ${WUZAPI_POSTGRES_PASSWORD:?WUZAPI_POSTGRES_PASSWORD is required}
      DB_NAME: wuzapi
      DB_HOST: db
      DB_PORT: 5432
      TZ: America/Sao_Paulo
      WEBHOOK_FORMAT: json
      SESSION_DEVICE_NAME: "Kesia Dutra Cabeleireira"
      RABBITMQ_URL: amqp://${WUZAPI_RABBITMQ_USER:?WUZAPI_RABBITMQ_USER is required}:${WUZAPI_RABBITMQ_PASSWORD:?WUZAPI_RABBITMQ_PASSWORD is required}@rabbitmq:5672/
      RABBITMQ_QUEUE: whatsapp_events
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - wuzapi-network

  db:
    image: postgres:16
    container_name: kesia-wuzapi-db
    environment:
      POSTGRES_USER: wuzapi
      POSTGRES_PASSWORD: ${WUZAPI_POSTGRES_PASSWORD:?WUZAPI_POSTGRES_PASSWORD is required}
      POSTGRES_DB: wuzapi
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wuzapi"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - wuzapi-db-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - wuzapi-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: kesia-wuzapi-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${WUZAPI_RABBITMQ_USER:?WUZAPI_RABBITMQ_USER is required}
      RABBITMQ_DEFAULT_PASS: ${WUZAPI_RABBITMQ_PASSWORD:?WUZAPI_RABBITMQ_PASSWORD is required}
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - wuzapi-rabbitmq-data:/var/lib/rabbitmq
    restart: unless-stopped
    networks:
      - wuzapi-network

networks:
  wuzapi-network:
    driver: bridge

volumes:
  wuzapi-db-data:
  wuzapi-rabbitmq-data:
